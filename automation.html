<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nexus – Automation Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --primary: #3b6ef8;
            --primary-dark: #2952d9;
            --bg-canvas: #f4f6f9;
            --bg-white: #ffffff;
            --border: #e8eaf0;
            --text-dark: #1a1a2e;
            --text-muted: #6b7280;
            --text-light: #9ca3af;
            --danger: #ef4444;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-canvas); 
            color: var(--text-dark); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        .sidebar { 
            width: 260px; 
            background: var(--bg-white); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
        }

        .sidebar-logo { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 20px 24px; 
            border-bottom: 1px solid var(--border); 
        }

        .logo-icon { 
            width: 36px; 
            height: 36px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
        }

        .sidebar-nav { 
            flex: 1; 
            padding: 16px 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
        }

        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 10px 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            color: var(--text-muted); 
            font-size: 14px; 
            font-weight: 500; 
            transition: 0.2s; 
            text-decoration: none; 
        }

        .nav-item:hover, .nav-item.active { 
            background: #f0f4ff; 
            color: var(--primary); 
        }

        .nav-item.active { 
            font-weight: 600; 
        }

        .sidebar-user { 
            padding: 16px 20px; 
            border-top: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .av-sm { 
            width: 34px; 
            height: 34px; 
            border-radius: 50%; 
            background: var(--primary); 
            color: white; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 12px; 
            flex-shrink: 0; 
        }

        .user-info { 
            flex: 1; 
            overflow: hidden; 
        }

        .user-name { 
            font-size: 13px; 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .user-email { 
            font-size: 11px; 
            color: var(--text-light); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .logout-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            color: var(--text-muted); 
            padding: 4px; 
            border-radius: 6px; 
            transition: 0.2s; 
        }

        .logout-btn:hover { 
            color: var(--danger); 
            background: #fef2f2; 
        }

        /* სამუშაო არეალი */
        .main-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }

        .canvas { 
            flex: 1; 
            overflow: auto; 
            padding: 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-image: radial-gradient(#d1d9e8 1px, transparent 1px); 
            background-size: 30px 30px; 
            position: relative; 
        }

        .node { 
            background: var(--bg-white); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 16px; 
            width: 320px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            z-index: 2; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        .node:hover { 
            border-color: var(--primary); 
            transform: translateY(-2px); 
        }

        .node-header { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .node-icon { 
            width: 36px; 
            height: 36px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .icon-blue { background: #eff3ff; color: var(--primary); }
        .icon-gray { background: #f4f6f9; color: var(--text-muted); }

        .node-body { 
            padding-left: 48px; 
            margin-top: 4px; 
        }

        .node-title { 
            font-size: 14px; 
            font-weight: 700; 
        }

        .node-desc { 
            font-size: 12px; 
            color: var(--text-light); 
        }

        .line { 
            height: 40px; 
            width: 2px; 
            background: #cbd5e1; 
            position: relative; 
        }

        .line::after { 
            content: '▼'; 
            position: absolute; 
            bottom: -8px; 
            left: -5px; 
            font-size: 10px; 
            color: #cbd5e1; 
        }

        .btn-plus { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            font-size: 24px; 
            cursor: pointer; 
            box-shadow: 0 10px 15px -3px rgba(59,110,248,0.4); 
            transition: 0.2s; 
        }

        .btn-plus:hover { 
            transform: scale(1.05); 
            background: var(--primary-dark); 
        }

        .toast { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%) translateY(20px); 
            background: #1a1a2e; 
            color: white; 
            padding: 14px 24px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 500; 
            opacity: 0; 
            transition: all 0.3s ease; 
            z-index: 9999; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger); }
        .toast.success { background: #10b981; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal.show { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            width: 550px;
            max-width: 90%;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }

        .modal-content h3 { margin-bottom: 20px; font-size: 20px; }
        
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            margin-bottom: 16px;
            font-size: 14px;
            outline: none;
        }

        .modal-content textarea { min-height: 100px; resize: vertical; }
        
        .modal-buttons { 
            display: flex; 
            gap: 12px; 
            justify-content: flex-end; 
            margin-top: 12px; 
        }

        .modal-buttons button { 
            padding: 10px 20px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            font-weight: 500; 
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-cancel { background: #e2e8f0; color: var(--text-dark); }
        .btn-send { background: #10b981; color: white; }

        .condition-group {
            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .condition-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .condition-row select, .condition-row input { margin-bottom: 0; }
        
        .label-sm {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </div>
        <span style="font-weight:700; font-size:15px;">Nexus</span>
    </div>

    <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>

        <a class="nav-item" href="conversations.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Conversations
        </a>

        <a class="nav-item active" href="automation.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Automation
        </a>

        <a class="nav-item" href="opportunities.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Opportunities
        </a>
    </nav>

    <div class="sidebar-user">
        <div class="av-sm" id="sidebar-avatar">JD</div>
        <div class="user-info">
            <div class="user-name" id="sidebar-name">Loading…</div>
            <div class="user-email" id="sidebar-email"></div>
        </div>

        <button class="logout-btn" id="logout-btn" title="Log out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
    </div>
</aside>

<div class="main-area">
    <header style="background:white; padding:20px 30px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h1 style="font-size:18px; cursor:pointer;" id="workflowHeaderName"> ჩემი ავტომატიზაცია</h1>
            <span style="font-size:12px; color:var(--text-light);" id="workflowStatus">ცარიელი</span>
        </div>
        <button id="publishWorkflowBtn" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer;">Publish</button>
    </header>

    <div class="canvas" id="canvasContainer">
        <div id="workflowNodesArea" style="display: flex; flex-direction: column; align-items: center; width: 100%;"></div>
    </div>
</div>

<button class="btn-plus" id="addNodeBtn">+</button>
<div class="toast" id="toast"></div>

<div class="modal" id="triggerModal">
    <div class="modal-content">
        <h3>ტრიგერის კონფიგურაცია</h3>
        <div class="condition-group">
            <div class="label-sm">პირობა (Condition)</div>
            <div class="condition-row">
                <select id="conditionField" style="flex:1.5">
                    <option value="full_name">Full Name</option>
                    <option value="email">Email</option>
                    <option value="phone">Phone</option>
                    <option value="company">Company</option>
                </select>
                <select id="conditionOperator" style="flex:1">
                    <option value="contains">contains</option>
                    <option value="equals">equals</option>
                    <option value="starts_with">starts with</option>
                    <option value="ends_with">ends with</option>
                </select>
                <input type="text" id="conditionValue" placeholder="მაგ: {contact.name}" value="{contact.name}" style="flex:2">
            </div>
        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" id="closeTriggerBtn">გაუქმება</button>
            <button class="btn-save" id="saveTriggerBtn">შენახვა</button>
        </div>
    </div>
</div>

<div class="modal" id="emailModal">
    <div class="modal-content">
        <h3>✉️ მეილის კონფიგურაცია</h3>
        <input type="text" id="emailSubjectInput" placeholder="Subject (თემა)" value="მადლობა რეგისტრაციისთვის">
        <textarea id="emailBodyInput" placeholder="წერილის ტექსტი...">მოგესალმებით ჩვენს ჯგუფში! მოხარულები ვართ, რომ შემოგვიერთდით</textarea>
        <div class="condition-group">
            <div class="label-sm">📬 მიმღები</div>
            <input type="email" id="recipientEmail" placeholder="შენი მეილი (სადაც მიიღებ შეტყობინებას)" value="">
            <div style="font-size:12px; color:#10b981; margin-top:8px;">
                 EmailJS კონფიგურირებულია! მეილი პირდაპირ იგზავნება
            </div>
        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" id="closeEmailModalBtn">გაუქმება</button>
            <button class="btn-send" id="sendEmailBtn">📧 გაგზავნა (პირდაპირ)</button>
            <button class="btn-save" id="saveEmailBtn">შენახვა</button>
        </div>
    </div>
</div>

<script>
    const EMAILJS_CONFIG = {
        PUBLIC_KEY: "b3KBG1XCHXRyf6Y7N",
        SERVICE_ID: "service_qcn5hoe",
        TEMPLATE_ID: "template_jn8q8by"
    };

    emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);
    console.log("✅ EmailJS initialized");
    const API = 'http://127.0.0.1:5000';

    function showToast(msg, type='') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast ' + type;
        void t.offsetWidth; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 4000);
    }

    function initials(name) { return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
    const stored = localStorage.getItem('nexus_user');
    if (!stored) {
        showToast('⚠️ You are not registered or logged in!', 'error');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    } else {
        const user = JSON.parse(stored);
        document.getElementById('sidebar-name').textContent  = user.username;
        document.getElementById('sidebar-email').textContent = user.email;
        document.getElementById('sidebar-avatar').textContent = initials(user.username);
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
        try { await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' }); } catch {}
        localStorage.removeItem('nexus_user');
        window.location.href = 'index.html';
    });

    let workflowSteps = [];
    let nextId = 1;
    let editingNodeId = null;
    let editingNodeType = null;

    function renderWorkflow() {
        const container = document.getElementById('workflowNodesArea');
        if (!container) return;

        if (workflowSteps.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
                    <div style="font-size: 48px; margin-bottom: 16px;">+</div>
                    <div style="font-size: 14px;">დაამატე პირველი ბლოკი</div>
                    <div style="font-size: 12px; margin-top: 8px;">Trigger (პირობით) ან Email</div>
                </div>
            `;
            document.getElementById('workflowStatus').innerText = 'ცარიელი';
            return;
        }

        let html = '';
        for (let i = 0; i < workflowSteps.length; i++) {
            const step = workflowSteps[i];
            const isTrigger = step.type === 'trigger';
            const iconClass = isTrigger ? 'icon-gray' : 'icon-blue';
            const iconSvg = isTrigger ? 
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' :
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>';
            
            let descText = '';
            if (step.type === 'trigger') {
                descText = `${step.conditionField || 'Full Name'} ${step.conditionOperator || 'contains'} "${step.conditionValue || '...'}"`;
            } else {
                descText = `📧 ${step.emailSubject || 'no subject'}`;
            }

            html += `
                <div class="node" data-node-id="${step.id}" data-node-type="${step.type}">
                    <div class="node-header">
                        <div class="node-icon ${iconClass}">
                            ${iconSvg}
                        </div>
                        <div class="node-title">${escapeHtml(step.name)}</div>
                    </div>
                    <div class="node-body">
                        <div class="node-desc">${escapeHtml(descText)}</div>
                    </div>
                </div>
            `;

            if (i < workflowSteps.length - 1) {
                html += `<div class="line"></div>`;
            }
        }

        container.innerHTML = html;
        document.querySelectorAll('.node').forEach(nodeEl => {
            nodeEl.addEventListener('click', (e) => {
                e.stopPropagation();
                const nodeId = parseInt(nodeEl.dataset.nodeId);
                const nodeType = nodeEl.dataset.nodeType;
                const step = workflowSteps.find(s => s.id === nodeId);
                if (step) {
                    if (nodeType === 'email') {
                        editingNodeId = step.id;
                        editingNodeType = 'email';
                        document.getElementById('emailSubjectInput').value = step.emailSubject || '';
                        document.getElementById('emailBodyInput').value = step.emailBody || '';
                        document.getElementById('emailModal').classList.add('show');
                    } else if (nodeType === 'trigger') {
                        editingNodeId = step.id;
                        editingNodeType = 'trigger';
                        document.getElementById('conditionField').value = step.conditionField || 'full_name';
                        document.getElementById('conditionOperator').value = step.conditionOperator || 'contains';
                        document.getElementById('conditionValue').value = step.conditionValue || '{contact.name}';
                        document.getElementById('triggerModal').classList.add('show');
                    }
                }
            });
        });

        document.getElementById('workflowStatus').innerText = workflowSteps.length + ' ბლოკი';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function addNewNode() {
        const choice = confirm('რის დამატება გინდა?\nOK → Email (მეილის გაგზავნა)\nCancel → Trigger (პირობითი ტრიგერი)');
        if (choice) {
            workflowSteps.push({
                id: nextId++,
                type: 'email',
                name: '📧 გაგზავნა Email',
                emailSubject: 'მადლობა რეგისტრაციისთვის',
                emailBody: 'მოგესალმებით! მოხარულები ვართ, რომ შემოგვიერთდით'
            });
            showToast('✉️ Email ბლოკი დაემატა');
        } else {
            workflowSteps.push({
                id: nextId++,
                type: 'trigger',
                name: '🎯 ფორმის შევსება',
                conditionField: 'full_name',
                conditionOperator: 'contains',
                conditionValue: '{contact.name}'
            });
            showToast('⚡ Trigger ბლოკი დაემატა');
        }
        renderWorkflow();
    }

    function saveTrigger() {
        if (editingNodeId !== null && editingNodeType === 'trigger') {
            const step = workflowSteps.find(s => s.id === editingNodeId);
            if (step) {
                step.conditionField = document.getElementById('conditionField').value;
                step.conditionOperator = document.getElementById('conditionOperator').value;
                step.conditionValue = document.getElementById('conditionValue').value;
                step.name = ` ${step.conditionField} ${step.conditionOperator} "${step.conditionValue}"`;
                renderWorkflow();
                showToast('✅ ტრიგერის პირობა შენახულია');
            }
        }
        document.getElementById('triggerModal').classList.remove('show');
        editingNodeId = null;
    }

    function saveEmail() {
        if (editingNodeId !== null && editingNodeType === 'email') {
            const step = workflowSteps.find(s => s.id === editingNodeId);
            if (step) {
                step.emailSubject = document.getElementById('emailSubjectInput').value;
                step.emailBody = document.getElementById('emailBodyInput').value;
                step.name = ` ${step.emailSubject.substring(0, 35)}`;
                renderWorkflow();
                showToast(' მეილის შაბლონი შენახულია');
            }
        }
        document.getElementById('emailModal').classList.remove('show');
        editingNodeId = null;
    }

    async function sendEmailDirectly() {
        const recipient = document.getElementById('recipientEmail').value.trim();
        const subject = document.getElementById('emailSubjectInput').value;
        const body = document.getElementById('emailBodyInput').value;

        if (!recipient) {
            showToast('❌ გთხოვთ შეიყვანოთ მიმღების მეილი!', 'error');
            return;
        }

        if (!recipient.includes('@')) {
            showToast('❌ არასწორი მეილის ფორმატი', 'error');
            return;
        }

        showToast('📨 იგზავნება... მოიცადეთ', '');

        try {
            const templateParams = {
                to_email: recipient,
                subject: subject,
                message: body
            };
            
            console.log("📤 იგზავნება:", templateParams);

            const response = await emailjs.send(
                EMAILJS_CONFIG.SERVICE_ID,
                EMAILJS_CONFIG.TEMPLATE_ID,
                templateParams
            );
            
            if (response.status === 200) {
                showToast(`✅ მეილი წარმატებით გაიგზავნა ${recipient}-ზე! შეამოწმე ინბოქსი`, 'success');
                console.log("✅ წარმატებით გაიგზავნა:", response);
            } else {
                throw new Error('Status: ' + response.status);
            }
        } catch (error) {
            console.error('❌ EmailJS შეცდომა:', error);
            showToast('❌ ვერ გაიგზავნა! შეამოწმე EmailJS ტემპლეიტის ველები (to_email, subject, message)', 'error');
        }
    }
    
    document.getElementById('publishWorkflowBtn').addEventListener('click', () => {
        const emailBlocks = workflowSteps.filter(s => s.type === 'email');
        const triggerBlocks = workflowSteps.filter(s => s.type === 'trigger');
        let message = '✅ გამოქვეყნდა!\n';
        if (triggerBlocks.length) message += `🔹 ტრიგერი: ${triggerBlocks.length}\n`;
        if (emailBlocks.length) message += `🔸 მეილები: ${emailBlocks.length}\n`;

        showToast(message, 'success');
        console.log('PUBLISHED:', workflowSteps);
    });

    document.getElementById('addNodeBtn').addEventListener('click', addNewNode);

    document.getElementById('closeTriggerBtn').addEventListener('click', () => {
        document.getElementById('triggerModal').classList.remove('show');
        editingNodeId = null;
    });
    document.getElementById('saveTriggerBtn').addEventListener('click', saveTrigger);
    
    document.getElementById('closeEmailModalBtn').addEventListener('click', () => {
        document.getElementById('emailModal').classList.remove('show');
        editingNodeId = null;
    });
    document.getElementById('saveEmailBtn').addEventListener('click', saveEmail);
    document.getElementById('sendEmailBtn').addEventListener('click', sendEmailDirectly);

    window.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) {
            e.target.classList.remove('show');
            editingNodeId = null;
        }
    });

    const headerName = document.getElementById('workflowHeaderName');
    headerName.addEventListener('click', () => {
        const newName = prompt('შეცვალე ავტომატიზაციის სახელი:', headerName.innerText.replace('🏷️ ', ''));
        if (newName && newName.trim()) {
            headerName.innerText = '🏷️ ' + newName.trim();
            showToast('📝 სახელი შეიცვალა');
        }
    });

    workflowSteps = [];
    renderWorkflow();
    showToast('✅ მზადაა! დაამატე Email ბლოკი, ჩაწერე მეილი და დააჭირე გაგზავნას', 'success');
</script>

</body>
</html>
